<!DOCTYPE html>
<!--
  ================================================================
  BLOG POST REDIRECT STUB TEMPLATE
  ================================================================
  PURPOSE
  - Keep pretty post URLs working:
      /blog/posts/YYYY-MM-DD-your-slug/
  - Redirect visitors to shared renderer:
      /blog/post/?slug=YYYY-MM-DD-your-slug

  HOW TO PUBLISH A NEW POST
  1) Create folder:
       blog/posts/YYYY-MM-DD-your-slug/
  2) Add content:
       blog/posts/YYYY-MM-DD-your-slug/post.md
  3) Optionally add cover:
       blog/posts/YYYY-MM-DD-your-slug/cover.jpg
  4) Copy this file to:
       blog/posts/YYYY-MM-DD-your-slug/index.html
  5) Replace every TODO_SLUG in this file.
  6) Add post metadata to blog/blog-data.js.
  7) Add pretty URL to sitemap.xml.
  ================================================================
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/blog/post/?slug=TODO_SLUG" />
    <link rel="canonical" href="https://octigen.com/blog/post/?slug=TODO_SLUG" />
    <script>
      window.location.replace("/blog/post/?slug=TODO_SLUG");
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a href="/blog/post/?slug=TODO_SLUG">the blog post</a>.
    </p>
  </body>
</html>

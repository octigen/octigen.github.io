<!DOCTYPE html>
<!--
  ================================================================
  BLOG POST TEMPLATE
  ================================================================
  HOW TO PUBLISH A NEW POST:

  1. Create the post folder:
       blog/posts/YYYY-MM-DD-your-slug/

  2. Copy this file into that folder as index.html.
     Fill in every TODO field below.

  3. Create the post content file:
       blog/posts/YYYY-MM-DD-your-slug/post.md
     Write your article in standard Markdown. No front matter needed —
     all metadata lives in this HTML file and in blog-data.js.

  4. Add an entry at the TOP of the BLOG_POSTS array in blog/blog-data.js.

  5. Add the post URL to sitemap.xml.

  That's it. The content is fetched and rendered automatically.
  ================================================================

  MARKDOWN REFERENCE (post.md):
  ─────────────────────────────
  # Heading 1 (avoid — the page title is already the H1)
  ## Heading 2
  ### Heading 3

  **bold**   _italic_   `inline code`

  > Blockquote text here.

  - Unordered item
  - Another item

  1. Ordered item
  2. Another item

  [Link text](https://example.com)

  ![Alt text](image.jpg)

  ---   (horizontal rule / section break)

  ```js
  const x = 1;  // fenced code block
  ```
  ================================================================
-->
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />

    <!-- Theme Initialization (must be first to prevent flash of wrong theme) -->
    <script>
      (function() {
        var stored = localStorage.getItem('octigen-theme');
        var theme = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
